name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Fix
        run: mise run fix

      - name: Check for modified files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after 'mise run fix'. Run 'mise run fix' locally and commit the changes."
            git status
            git diff
            exit 1
          fi

      - name: Test
        run: mise run test
